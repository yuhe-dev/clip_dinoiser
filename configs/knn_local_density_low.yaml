_base_: "default.yml"
defaults:
  - _self_

seed: 0
model_name: CLIP_DINOiser
model:
  type: CLIP_DINOiser
  clip_backbone: maskclip
  vit_arch: vit_base
  vit_patch_size: 16
  enc_type_feats: "v"
  gamma: 0.2
  in_dim: 256
  delta: 0.99
  feats_idx: -3

train:
  batch_size: 16
  corr_lr: 0.00005
  found_lr: 0.01
  num_workers: 4
  epochs: 3
  milestones:
    - 5000
  step_lr_gamma: 0.1
  data: "./data/coco_stuff164k" # CHANGE to your ImageNet data folder
  loss: CE
  ds_size: 1000
  im_size: 448
output: "knn_local_density" # CHANGE to your results folder

experiment:
  feature_name: "knn_local_density_faiss"
  feature_kwargs:
    cache_dir: "visual_embedding"     # 你存 embedding 的目录
    emb_file: "visual_emb.npy"        # 你保存的视觉 embedding
    paths_file: "clip_paths_abs.json"     # 对应路径列表
    k: 50
    metric: "cosine"                  # cosine / l2
    mode: "inv_mean_dist"             # mean_dist / inv_mean_dist / radius_count
    include_self: false
    normalize_for_cosine: true
    use_gpu: false
    radius: 0.2                       # 只有 mode=radius_count 才用
  sample_count: 20000
  subset_strategy: "low" # low/high/mixed/random
  visualize: True

evaluate:
  eval_only: true
  task:
    # - voc
    # - context
    # - coco_object
    # - context59
    # - voc20
    - coco_stuff
    # - cityscapes
    # - ade20k
    # - coco_stuff_train

  # evaluation
  voc: segmentation/configs/_base_/datasets/pascal_voc12.py
  voc20: segmentation/configs/_base_/datasets/pascal_voc12_20.py
  context: segmentation/configs/_base_/datasets/pascal_context.py
  context59: segmentation/configs/_base_/datasets/pascal_context59.py
  coco_stuff: segmentation/configs/_base_/datasets/stuff.py
  coco_object: segmentation/configs/_base_/datasets/coco.py
  cityscapes: segmentation/configs/_base_/datasets/cityscapes.py
  ade20k: segmentation/configs/_base_/datasets/ade20k.py
  coco_stuff_train: segmentation/configs/_base_/datasets/stuff_train.py
